# @package train

_target_: src.training.trainer.VideoCaptioningTrainer

# Training hyperparameters
batch_size: 8
learning_rate: 1e-5
num_epochs: 10
warmup_steps: 100
gradient_accumulation_steps: 1
max_grad_norm: 1.0
weight_decay: 0.01

# Optimization
optimizer: adamw
scheduler: linear_warmup_cosine
beta1: 0.9
beta2: 0.999
eps: 1e-8

# Loss function
loss_type: cross_entropy
label_smoothing: 0.1

# Checkpointing
save_strategy: steps
save_steps: 1000
save_total_limit: 3
load_best_model_at_end: true
metric_for_best_model: eval_cider

# Logging
logging_strategy: steps
logging_steps: 100
logging_first_step: true
logging_nan_inf_filter: true

# Evaluation
eval_strategy: steps
eval_steps: 500
evaluation_accumulation_steps: 1
prediction_loss_only: false

# Mixed precision
fp16: false
bf16: true
tf32: true
